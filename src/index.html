<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>fzt-desktop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <!-- fzt-terminal.css is downloaded from fzt-browser release at build
         time and copied alongside these files. Dev-only: optional. -->
    <link rel="stylesheet" href="fzt-terminal.css" onerror="this.remove()" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <!-- Pixel-art layer — z-index 0, rendered via canvas. Populated by
         the ambience client once wired. -->
    <canvas id="ambience-canvas"></canvas>

    <!-- Main app surface — sits above the canvas -->
    <div class="page">
      <!-- fzt-automate terminal will mount here once fzt.wasm is wired -->
      <div id="terminal" class="fzt-terminal-window">
        <pre id="terminal-content">fzt-desktop scaffold — fzt.wasm integration pending</pre>
      </div>

      <!-- Status line for silent command execution feedback -->
      <div id="status" class="status-line"></div>
    </div>

    <!-- Loading overlay, hidden once fzt.wasm boots -->
    <div id="loading" class="loading hidden">Loading fzt...</div>
  </body>
</html>
